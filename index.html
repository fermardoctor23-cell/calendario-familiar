<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Calendario familiar</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" sizes="192x192" href="icon-192.png">
  <link rel="icon" sizes="512x512" href="icon-512.png">
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #dbe3ef;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #e8f0ff;
      --sat: #edf6ff;
      --sun: #ffeef5;
      --fernando: #dbeafe;
      --yolanda: #fde7f3;
      --both: #e8f8ea;
      --today-ring: #2563eb;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ebf2ff 0px, var(--bg) 180px);
    }

    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(219, 227, 239, 0.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      padding: 14px;
      margin-bottom: 12px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.15;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .65; cursor: not-allowed; transform: none; }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-soft { background: #eef4ff; color: #214db8; }
    .btn-danger { background: #ffe1e1; color: #b42318; }

    .who-chip, .view-chip {
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      background: #f3f4f6;
      color: #374151;
      border: 1px solid transparent;
    }

    .who-chip.active[data-who="fernando"] { background: var(--fernando); border-color: #bfd8ff; }
    .who-chip.active[data-who="yolanda"] { background: var(--yolanda); border-color: #f6bfdc; }
    .who-chip.active[data-who="both"] { background: var(--both); border-color: #bde3c4; }
    .view-chip.active { background: var(--primary); color: white; }

    .status {
      padding: 0 14px 10px;
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 24px;
    }

    .calendar-shell { padding: 12px; }

    .month-bar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .month-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 800;
    }

    .nav-btn {
      min-width: 44px;
      background: #edf3ff;
      color: #214db8;
      font-weight: 800;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.84rem;
      margin-bottom: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.06);
      display: inline-block;
    }

    .weekday-row, .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekday-row { margin-bottom: 8px; }

    .weekday {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    .day {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 4px 4px 4px;
      overflow: hidden;
      background: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .day-guardia {
      background: #ffdede !important;
      border-color: #ff6b6b !important;
    }

    .day-malvarrosa {
      background: #f0ddff !important;
      border-color: #b57aff !important;
    }
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 4px 4px 4px;
      overflow: hidden;
      background: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .day.other-month {
      opacity: .42;
      background: #fafcff;
    }

    .day.sat { background: var(--sat); }
    .day.sun { background: var(--sun); }

    .day.today {
      box-shadow: inset 0 0 0 2px var(--today-ring);
    }

    .day-num {
      font-size: 0.92rem;
      font-weight: 800;
      margin-bottom: 4px;
      padding-right: 12px;
      line-height: 1;
    }

    .corner-icon {
      position: absolute;
      top: 6px;
      right: 7px;
      font-size: 0.9rem;
      line-height: 1;
      opacity: .88;
      pointer-events: none;
      display: none;
    }

    .corner-icon.has-icon {
      display: block;
    }

    .events-stack {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .event-pill {
      border-radius: 6px;
      padding: 2px 4px;
      font-size: 0.64rem;
      line-height: 1.05;
      font-weight: 700;
      border: 1px solid rgba(0,0,0,.05);
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      min-height: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .event-pill small {
      display: block;
      font-size: 0.54rem;
      font-weight: 600;
      opacity: .8;
      margin-top: 0;
      line-height: 1;
    }

    .owner-fernando { background: var(--fernando); }
    .owner-yolanda { background: var(--yolanda); }
    .owner-both { background: var(--both); }
    .owner-default { background: #eef2f7; }

    .more-pill {
      font-size: 0.58rem;
      color: var(--muted);
      font-weight: 700;
      padding-top: 1px;
      line-height: 1;
    }

    .week-view.hidden, .day-view.hidden, .month-view.hidden {
      display: none !important;
    }

    .week-view, .day-view {
      display: block;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .week-col, .day-panel {
      min-height: 70vh;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 10px;
    }

    .week-col.sat { background: var(--sat); }
    .week-col.sun { background: var(--sun); }

    .week-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 800;
    }

    .week-date { color: var(--muted); font-size: .82rem; }

    .week-events, .day-events {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .week-event, .day-event {
      position: relative;
      padding: 10px 12px 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.05);
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,.04);
      cursor: pointer;
    }

    .event-meta {
      color: rgba(31, 41, 55, .72);
      font-size: .8rem;
      margin-top: 4px;
      font-weight: 600;
    }

    .event-corner {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 1rem;
      opacity: .8;
    }

    .empty-state {
      color: var(--muted);
      font-size: .92rem;
      padding: 10px 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.38);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      padding: 10px;
    }

    .modal {
      width: min(720px, 100%);
      background: white;
      border-radius: 22px 22px 0 0;
      padding: 16px;
      max-height: 92vh;
      overflow: auto;
      box-shadow: 0 -6px 30px rgba(15, 23, 42, 0.18);
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 1.15rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    .field label {
      font-size: .88rem;
      color: var(--muted);
      font-weight: 700;
    }

    input, select, textarea {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      background: #fff;
      min-height: 44px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      margin-top: 16px;
    }

    .actions-left, .actions-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .day { aspect-ratio: 1 / 1; min-height: 0; }
      .event-pill { font-size: .77rem; }
      .week-grid { grid-template-columns: 1fr; }
      .week-col { min-height: auto; }
    }

    @media (max-width: 760px) {
      body.landscape-mobile .app {
        max-width: 100vw;
        width: 100vw;
        padding: 2px;
      }
      body.landscape-mobile .topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        padding: 6px 8px;
        gap: 6px;
        margin-bottom: 4px;
      }
      body.landscape-mobile .weekday-row, body.landscape-mobile .month-grid {
        gap: 1px;
      }
      body.landscape-mobile .day {
        aspect-ratio: 1 / 1;
        border-radius: 6px;
        padding: 1px;
      }
      body.landscape-mobile .event-pill {
        font-size: .48rem;
        padding: 1px 2px;
        min-height: 12px;
        border-radius: 4px;
      }

      @media (orientation: landscape) {
        body {
          overflow-x: hidden;
        }
        body.landscape-mobile .title-wrap h1 {
          font-size: .92rem;
        }
        body.landscape-mobile .subtitle,
        body.landscape-mobile .legend,
        body.landscape-mobile .status {
          display: none;
        }
        body.landscape-mobile .toolbar {
          gap: 4px;
        }
        body.landscape-mobile .who-chip,
        body.landscape-mobile .view-chip,
        body.landscape-mobile .btn-primary,
        body.landscape-mobile .btn-soft,
        body.landscape-mobile .nav-btn {
          font-size: .68rem;
          padding: 5px 7px;
          border-radius: 8px;
          min-width: 30px;
        }
        body.landscape-mobile .calendar-shell {
          padding: 4px;
        }
        body.landscape-mobile .month-bar {
          margin-bottom: 4px;
          gap: 6px;
        }
        body.landscape-mobile .month-title {
          font-size: .88rem;
        }
        body.landscape-mobile .weekday {
          font-size: .52rem;
        }
        body.landscape-mobile .day-num {
          font-size: .62rem;
          margin-bottom: 1px;
          padding-right: 8px;
        }
        body.landscape-mobile .corner-icon {
          font-size: .5rem;
          top: 2px;
          right: 2px;
        }
        body.landscape-mobile .more-pill {
          font-size: .45rem;
        }
      }
      }

      .app { padding: 4px; }
      .topbar { padding: 8px; gap: 8px; margin-bottom: 8px; }
      .title-wrap h1 { font-size: 1rem; }
      .subtitle { font-size: .74rem; }
      .toolbar { width: 100%; gap: 5px; }
      .who-chip, .view-chip, .btn-primary, .btn-soft {
        padding: 7px 9px;
        font-size: .78rem;
        border-radius: 10px;
      }
      .status {
        padding: 0 8px 6px;
        font-size: .78rem;
        min-height: 18px;
      }
      .month-title { font-size: .96rem; }
      .calendar-shell { padding: 6px; }
      .month-bar { margin-bottom: 8px; }
      .nav-btn {
        min-width: 36px;
        padding: 8px 10px;
        border-radius: 10px;
      }
      .legend {
        font-size: .62rem;
        gap: 5px;
        margin-bottom: 6px;
      }
      .weekday-row, .month-grid { gap: 3px; }
      .weekday {
        font-size: .6rem;
        letter-spacing: 0;
      }
      .day {
        width: 100%;
        aspect-ratio: 1 / 1;
        min-height: 0;
        padding: 3px;
        border-radius: 9px;
      }
      .day-num {
        font-size: .76rem;
        margin-bottom: 3px;
        padding-right: 10px;
      }
      .corner-icon {
        font-size: .64rem;
        top: 3px;
        right: 3px;
      }
      .event-pill {
        padding: 2px 3px;
        font-size: .58rem;
        border-radius: 5px;
        min-height: 16px;
      }
      .event-pill small {
        display: none;
      }
      .more-pill {
        font-size: .52rem;
      }
      .form-grid { grid-template-columns: 1fr; }
      .modal { border-radius: 20px 20px 0 0; padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card topbar">
      <div class="title-wrap">
        <h1>Calendario familiar</h1>
        <div class="subtitle">Vistas de mes, semana y día · Fernando · Yolanda · Ambos</div>
      </div>

      <div class="toolbar">
        <button class="who-chip active" data-who="fernando" id="whoBtnFernando">Fernando</button>
        <button class="who-chip" data-who="yolanda" id="whoBtnYolanda">Yolanda</button>
        <button class="who-chip" data-who="both" id="whoBtnBoth">Ambos</button>
      </div>

      <div class="toolbar">
        <button class="view-chip active" data-view="month">Mes</button>
        <button class="view-chip" data-view="week">Semana</button>
        <button class="view-chip" data-view="day">Día</button>
        <button class="btn-primary" id="newEventBtn">+ Evento</button>
        <button class="btn-soft" id="todayBtn">Hoy</button>
      </div>
    </div>

    <div class="status" id="statusText"></div>

    <div class="card calendar-shell">
      <div class="month-bar">
        <button class="nav-btn" id="prevBtn">‹</button>
        <div class="month-title" id="currentTitle"></div>
        <button class="nav-btn" id="nextBtn">›</button>
      </div>

      <div class="legend">
        <span><i class="dot" style="background: var(--sat)"></i> Sábado</span>
        <span><i class="dot" style="background: var(--sun)"></i> Domingo</span>
        <span><i class="dot" style="background: var(--fernando)"></i> Fernando</span>
        <span><i class="dot" style="background: var(--yolanda)"></i> Yolanda</span>
        <span><i class="dot" style="background: var(--both)"></i> Ambos</span>
      </div>

      <div id="monthView" class="month-view">
        <div class="weekday-row">
          <div class="weekday">Lun</div>
          <div class="weekday">Mar</div>
          <div class="weekday">Mié</div>
          <div class="weekday">Jue</div>
          <div class="weekday">Vie</div>
          <div class="weekday">Sáb</div>
          <div class="weekday">Dom</div>
        </div>
        <div class="month-grid" id="monthGrid"></div>
      </div>

      <div class="week-view hidden" id="weekView">
        <div class="week-grid" id="weekGrid"></div>
      </div>

      <div class="day-view hidden" id="dayView">
        <div class="day-panel" id="dayPanel"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">Nuevo evento</h2>
      <div class="form-grid">
        <div class="field full">
          <label for="eventTitle">Título</label>
          <input id="eventTitle" type="text" placeholder="Ej. Guardia HCUV" />
        </div>

        <div class="field">
          <label for="eventDate">Fecha inicio</label>
          <input id="eventDate" type="date" />
        </div>

        <div class="field">
          <label for="eventEndDate">Fecha fin</label>
          <input id="eventEndDate" type="date" />
        </div>

        <div class="field">
          <label for="eventTime">Hora</label>
          <input id="eventTime" type="time" />
        </div>

        <div class="field">
          <label for="eventWho">Quién</label>
          <select id="eventWho">
            <option value="fernando">Fernando</option>
            <option value="yolanda">Yolanda</option>
            <option value="both">Ambos</option>
          </select>
        </div>

        <div class="field">
          <label for="eventType">Tipo</label>
          <select id="eventType">
            <option value="normal">Sin icono</option>
            <option value="guardia_hcuv">🏥 Guardia HCUV</option>
            <option value="guardia_malvarrosa">🚑 Guardia Malvarrosa</option>
            <option value="cumpleanos">🎂 Cumpleaños</option>
            <option value="comida">🍽️ Comida</option>
            <option value="viaje">✈️ Viaje</option>
            <option value="reunion">👥 Reunión</option>
            <option value="congreso">🎓 Congreso</option>
            <option value="vacaciones">🏖️ Vacaciones</option>
            <option value="medico">🩺 Médico</option>
          </select>
        </div>

        <div class="field full">
          <label for="eventNote">Nota</label>
          <textarea id="eventNote" placeholder="Opcional"></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <div class="actions-left">
          <button class="btn-danger hidden" id="deleteBtn">Eliminar</button>
        </div>
        <div class="actions-right">
          <button class="btn-soft" id="cancelBtn">Cancelar</button>
          <button class="btn-primary" id="saveBtn">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyQbxkBeJkDskPKEpwd-pua_RKl_UEXHPZQPutpa51FJ0C6nKiYdPgN9sUXtT0OozoZ/exec';

    const state = {
      events: [],
      currentUser: 'fernando',
      currentView: 'month',
      currentDate: startOfDay(new Date()),
      editingId: null,
      isSaving: false,
      refreshTimer: null,
    };

    const monthNames = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const weekNames = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

    const typeIcons = {
      normal: '',
      guardia_hcuv: '🏥',
      guardia_malvarrosa: '🚑',
      cumpleanos: '🎂',
      comida: '🍽️',
      viaje: '✈️',
      reunion: '👥',
      congreso: '🎓',
      vacaciones: '🏖️',
      medico: '🩺'
    };

    const typeDayColors = {
      guardia_hcuv: 'day-guardia',
      guardia_malvarrosa: 'day-malvarrosa'
    };

    function inferGuardiaType(title) {
      const t = String(title || '').toLowerCase().trim();
      if (!t.includes('guardia')) return 'normal';
      if (t.includes('malvarrosa') || t.includes('malva')) return 'guardia_malvarrosa';
      return 'guardia_hcuv';
    }

    function getDayColorClass(items) {
      const inferredTypes = items.map(ev => inferGuardiaType(ev.title));
      if (inferredTypes.includes('guardia_malvarrosa')) return 'day-malvarrosa';
      if (inferredTypes.includes('guardia_hcuv')) return 'day-guardia';
      return '';
    }

    const els = {
      title: document.getElementById('currentTitle'),
      monthGrid: document.getElementById('monthGrid'),
      weekGrid: document.getElementById('weekGrid'),
      dayPanel: document.getElementById('dayPanel'),
      monthView: document.getElementById('monthView'),
      weekView: document.getElementById('weekView'),
      dayView: document.getElementById('dayView'),
      status: document.getElementById('statusText'),
      overlay: document.getElementById('overlay'),
      modalTitle: document.getElementById('modalTitle'),
      eventTitle: document.getElementById('eventTitle'),
      eventDate: document.getElementById('eventDate'),
      eventEndDate: document.getElementById('eventEndDate'),
      eventTime: document.getElementById('eventTime'),
      eventWho: document.getElementById('eventWho'),
      eventType: document.getElementById('eventType'),
      eventNote: document.getElementById('eventNote'),
      saveBtn: document.getElementById('saveBtn'),
      deleteBtn: document.getElementById('deleteBtn')
    };

    function startOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function pad(n) { return String(n).padStart(2, '0'); }
    function toYMD(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

    function normalizeDate(value) {
      if (!value) return '';
      const raw = String(value).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
      const cleaned = raw.replace(/\s*\([^)]*\)\s*/g, ' ').trim();
      const date = new Date(cleaned);
      if (!Number.isNaN(date.getTime())) return toYMD(date);
      return raw;
    }

    function normalizeTime(value) {
      if (!value) return '';
      const raw = String(value).trim();
      const hhmm = raw.match(/^(\d{1,2}):(\d{2})$/);
      if (hhmm) return `${hhmm[1].padStart(2, '0')}:${hhmm[2]}`;
      const cleaned = raw.replace(/\s*\([^)]*\)\s*/g, ' ').trim();
      const date = new Date(cleaned);
      if (!Number.isNaN(date.getTime())) return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
      return raw;
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return startOfDay(d);
    }

    function startOfMonthGrid(date) {
      const first = new Date(date.getFullYear(), date.getMonth(), 1);
      const mondayBased = (first.getDay() + 6) % 7;
      return addDays(first, -mondayBased);
    }

    function startOfWeek(date) {
      const mondayBased = (date.getDay() + 6) % 7;
      return addDays(date, -mondayBased);
    }

    function endOfWeek(date) { return addDays(startOfWeek(date), 6); }

    function ownerClass(who) {
      if (who === 'fernando') return 'owner-fernando';
      if (who === 'yolanda') return 'owner-yolanda';
      if (who === 'both') return 'owner-both';
      return 'owner-default';
    }

    function iconFor(event) { return typeIcons[event.type] || ''; }

    function formatMonthTitle(date) {
      if (state.currentView === 'month') return `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
      if (state.currentView === 'week') {
        const s = startOfWeek(date);
        const e = endOfWeek(date);
        if (s.getMonth() === e.getMonth()) return `${pad(s.getDate())}-${pad(e.getDate())} ${monthNames[s.getMonth()]} ${s.getFullYear()}`;
        return `${pad(s.getDate())} ${monthNames[s.getMonth()]} - ${pad(e.getDate())} ${monthNames[e.getMonth()]} ${e.getFullYear()}`;
      }
      return `${weekNames[(date.getDay()+6)%7]} ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
    }

    function eventMatchesUser(event) {
      return event.who === state.currentUser || event.who === 'both' || state.currentUser === 'both';
    }

    function eventSpansDate(event, ymd) {
      const start = normalizeDate(event.date);
      const end = normalizeDate(event.enddate || event.date || '');
      if (!start) return false;
      return ymd >= start && ymd <= (end || start);
    }

    function eventsForDate(ymd) {
      return state.events
        .filter(event => eventMatchesUser(event) && eventSpansDate(event, ymd))
        .sort((a, b) => (normalizeTime(a.time) || '99:99').localeCompare(normalizeTime(b.time) || '99:99') || a.title.localeCompare(b.title));
    }

    function summarizeEvent(event, onDate) {
      const time = normalizeTime(event.time);
      const isMulti = normalizeDate(event.enddate || '') && normalizeDate(event.enddate) !== normalizeDate(event.date);
      let sub = '';
      if (time) sub = time;
      if (isMulti) {
        const start = normalizeDate(event.date);
        const end = normalizeDate(event.enddate);
        if (onDate === start) sub = sub ? `${sub} · empieza` : 'Empieza';
        else if (onDate === end) sub = sub ? `${sub} · termina` : 'Termina';
        else sub = sub ? `${sub} · continúa` : 'Continúa';
      }
      return sub;
    }

    function setStatus(text, isError = false) {
      els.status.textContent = text || '';
      els.status.style.color = isError ? '#b42318' : 'var(--muted)';
    }

    async function loadEvents(showMessage = false) {
      if (!SCRIPT_URL || SCRIPT_URL.includes('PEGA_AQUI')) {
        setStatus('Pega tu URL de Apps Script en la constante SCRIPT_URL.', true);
        return;
      }
      try {
        if (showMessage) setStatus('Actualizando…');
        const res = await fetch(`${SCRIPT_URL}${SCRIPT_URL.includes('?') ? '&' : '?'}t=${Date.now()}`, { cache: 'no-store' });
        const data = await res.json();
        const rawEvents = Array.isArray(data) ? data : (data.events || []);
        state.events = rawEvents.map(ev => ({
          ...ev,
          date: normalizeDate(ev.date),
          enddate: normalizeDate(ev.enddate || ev.date || ''),
          time: normalizeTime(ev.time),
          who: (ev.who || 'fernando').toLowerCase(),
          type: ev.type || 'normal'
        }));
        render();
        if (showMessage) setStatus('Sincronizado.');
      } catch (err) {
        console.error(err);
        setStatus('Error conectando con Google Sheets.', true);
      }
    }

    async function saveEvents() {
      if (state.isSaving) return;
      state.isSaving = true;
      setStatus('Guardando…');

      try {
        const payload = {
          events: state.events.map(ev => ({
            id: ev.id || '',
            title: ev.title || '',
            date: normalizeDate(ev.date),
            time: normalizeTime(ev.time),
            enddate: normalizeDate(ev.enddate || ev.date || ''),
            who: ev.who || 'fernando',
            note: ev.note || '',
            createdBy: ev.createdBy || 'fernando',
            type: ev.type || 'normal'
          }))
        };

        const url = `${SCRIPT_URL}?action=save&data=${encodeURIComponent(JSON.stringify(payload))}`;
        const res = await fetch(url, { cache: 'no-store' });
        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.error || 'No se pudo guardar.');
        }

        setStatus('Guardado.');
        await new Promise(resolve => setTimeout(resolve, 300));
        await loadEvents(true);
      } catch (err) {
        console.error('saveEvents error', err);
        setStatus('Error al guardar.', true);
      } finally {
        state.isSaving = false;
      }
    }

    function inferType(title) {
      return 'normal';
    }

    function render() {
      els.title.textContent = formatMonthTitle(state.currentDate);
      document.querySelectorAll('.who-chip').forEach(btn => btn.classList.toggle('active', btn.dataset.who === state.currentUser));
      document.querySelectorAll('.view-chip').forEach(btn => btn.classList.toggle('active', btn.dataset.view === state.currentView));
      els.monthView.classList.toggle('hidden', state.currentView !== 'month');
      els.weekView.classList.toggle('hidden', state.currentView !== 'week');
      els.dayView.classList.toggle('hidden', state.currentView !== 'day');
      if (state.currentView === 'month') renderMonth();
      if (state.currentView === 'week') renderWeek();
      if (state.currentView === 'day') renderDay();
    }

    function renderMonth() {
      const gridStart = startOfMonthGrid(state.currentDate);
      const todayYmd = toYMD(startOfDay(new Date()));
      const currentMonth = state.currentDate.getMonth();
      els.monthGrid.innerHTML = '';
      const maxItems = window.innerWidth <= 760 ? 3 : 4;

      for (let i = 0; i < 42; i++) {
        const date = addDays(gridStart, i);
        const ymd = toYMD(date);
        const items = eventsForDate(ymd);
        const day = document.createElement('div');
        const isOtherMonth = date.getMonth() !== currentMonth;
        const weekday = date.getDay();
        day.className = 'day';

        // Colorear día según tipo de evento
        const specialClass = getDayColorClass(items);
        if (specialClass) {
          day.classList.add(specialClass);
        }
        if (isOtherMonth) day.classList.add('other-month');
        if (weekday === 6) day.classList.add('sat');
        if (weekday === 0) day.classList.add('sun');
        if (ymd === todayYmd) day.classList.add('today');

        const topIcon = (items[0] && iconFor(items[0])) ? `<div class="corner-icon has-icon">${iconFor(items[0])}</div>` : '';
        const shown = items.slice(0, maxItems).map(ev => {
          const sub = window.innerWidth <= 760 ? '' : summarizeEvent(ev, ymd);
          const title = compactTitle(ev.title, window.innerWidth <= 760 ? 10 : 18);
          const start = normalizeDate(ev.date);
          const end = normalizeDate(ev.enddate || ev.date || '');
          const isMulti = end && end !== start;
          let style = '';
          if (isMulti) {
            const prevDay = addDays(date, -1);
            const nextDay = addDays(date, 1);
            const prevIn = eventSpansDate(ev, toYMD(prevDay));
            const nextIn = eventSpansDate(ev, toYMD(nextDay));
            if (prevIn) style += 'border-top-left-radius:0;border-bottom-left-radius:0;margin-left:-4px;padding-left:7px;';
            if (nextIn) style += 'border-top-right-radius:0;border-bottom-right-radius:0;margin-right:-4px;padding-right:7px;';
          }
          return `<div class="event-pill ${ownerClass(ev.who)}" style="${style}" data-id="${escapeHtml(ev.id)}">${escapeHtml(title)}${sub ? `<small>${escapeHtml(sub)}</small>` : ''}</div>`;
        }).join('');
        const more = items.length > maxItems ? `<div class="more-pill">+${items.length - maxItems} más</div>` : '';

        day.innerHTML = `${topIcon}<div class="day-num">${date.getDate()}</div><div class="events-stack">${shown}${more}</div>`;
        day.addEventListener('click', (e) => {
          const pill = e.target.closest('.event-pill');
          if (pill) { e.stopPropagation(); openEdit(pill.dataset.id); return; }
          openCreate(ymd);
        });
        els.monthGrid.appendChild(day);
      }
    }

    function renderWeek() {
      const start = startOfWeek(state.currentDate);
      els.weekGrid.innerHTML = '';
      for (let i = 0; i < 7; i++) {
        const date = addDays(start, i);
        const ymd = toYMD(date);
        const items = eventsForDate(ymd);
        const col = document.createElement('div');
        col.className = 'week-col';
        if (date.getDay() === 6) col.classList.add('sat');
        if (date.getDay() === 0) col.classList.add('sun');
        const eventsHtml = items.length ? items.map(ev => {
          const sub = summarizeEvent(ev, ymd);
          return `<div class="week-event ${ownerClass(ev.who)}" data-id="${escapeHtml(ev.id)}">${iconFor(ev) ? `<div class="event-corner">${iconFor(ev)}</div>` : ''}${escapeHtml(ev.title)}<div class="event-meta">${escapeHtml(sub || ownerLabel(ev.who))}</div></div>`;
        }).join('') : '<div class="empty-state">Sin eventos</div>';
        col.innerHTML = `<div class="week-head"><div>${weekNames[i]}</div><div class="week-date">${date.getDate()}/${date.getMonth()+1}</div></div><div class="week-events">${eventsHtml}</div>`;
        col.addEventListener('click', (e) => {
          const eventCard = e.target.closest('.week-event');
          if (eventCard) openEdit(eventCard.dataset.id);
          else openCreate(ymd);
        });
        els.weekGrid.appendChild(col);
      }
    }

    function renderDay() {
      const ymd = toYMD(state.currentDate);
      const items = eventsForDate(ymd);
      const eventsHtml = items.length ? items.map(ev => {
        const meta = [];
        if (normalizeTime(ev.time)) meta.push(normalizeTime(ev.time));
        meta.push(ownerLabel(ev.who));
        if (ev.enddate && ev.enddate !== ev.date) meta.push(`${ev.date} → ${ev.enddate}`);
        return `<div class="day-event ${ownerClass(ev.who)}" data-id="${escapeHtml(ev.id)}">${iconFor(ev) ? `<div class="event-corner">${iconFor(ev)}</div>` : ''}${escapeHtml(ev.title)}<div class="event-meta">${escapeHtml(meta.join(' · '))}</div>${ev.note ? `<div class="event-meta">${escapeHtml(ev.note)}</div>` : ''}</div>`;
      }).join('') : '<div class="empty-state">Sin eventos este día</div>';

      els.dayPanel.innerHTML = `<div class="week-head"><div>${weekNames[(state.currentDate.getDay()+6)%7]}</div><div class="week-date">${state.currentDate.getDate()} ${monthNames[state.currentDate.getMonth()]} ${state.currentDate.getFullYear()}</div></div><div class="day-events">${eventsHtml}</div>`;
      els.dayPanel.querySelectorAll('.day-event').forEach(card => card.addEventListener('click', () => openEdit(card.dataset.id)));
      els.dayPanel.addEventListener('dblclick', () => openCreate(ymd));
    }

    function compactTitle(title, max = 12) {
      const t = String(title || '').trim();
      if (t.length <= max) return t;
      return t.slice(0, Math.max(1, max - 1)).trim() + '…';
    }

    function ownerLabel(who) {
      if (who === 'fernando') return 'Fernando';
      if (who === 'yolanda') return 'Yolanda';
      if (who === 'both') return 'Ambos';
      return '';
    }

    function escapeHtml(str) {
      return String(str || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }

    function openCreate(dateYmd = '') {
      state.editingId = null;
      els.modalTitle.textContent = 'Nuevo evento';
      els.eventTitle.value = '';
      els.eventDate.value = dateYmd || toYMD(state.currentDate);
      els.eventEndDate.value = dateYmd || toYMD(state.currentDate);
      els.eventTime.value = '';
      els.eventWho.value = state.currentUser;
      els.eventType.value = 'normal';
      els.eventNote.value = '';
      els.deleteBtn.classList.add('hidden');
      els.overlay.style.display = 'flex';
      setTimeout(() => els.eventTitle.focus(), 50);
    }

    function openEdit(id) {
      const event = state.events.find(e => e.id === id);
      if (!event) return;
      state.editingId = id;
      els.modalTitle.textContent = 'Editar evento';
      els.eventTitle.value = event.title || '';
      els.eventDate.value = normalizeDate(event.date) || '';
      els.eventEndDate.value = normalizeDate(event.enddate || event.date) || '';
      els.eventTime.value = normalizeTime(event.time) || '';
      els.eventWho.value = event.who || 'fernando';
      els.eventType.value = event.type || inferType(event.title || '');
      els.eventNote.value = event.note || '';
      els.deleteBtn.classList.remove('hidden');
      els.overlay.style.display = 'flex';
      setTimeout(() => els.eventTitle.focus(), 50);
    }

    function closeModal() { els.overlay.style.display = 'none'; }

    async function handleSave() {
      const title = els.eventTitle.value.trim();
      const date = normalizeDate(els.eventDate.value);
      const enddate = normalizeDate(els.eventEndDate.value || els.eventDate.value);
      const time = normalizeTime(els.eventTime.value);
      const who = els.eventWho.value;
      const type = els.eventType.value;
      const note = els.eventNote.value.trim();
      if (!title || !date) { setStatus('Pon al menos título y fecha.', true); return; }
      if (enddate && enddate < date) { setStatus('La fecha fin no puede ser anterior a la fecha inicio.', true); return; }
      const event = {
        id: state.editingId || `ev_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
        title, date, enddate: enddate || date, time, who, note, createdBy: state.currentUser, type
      };
      if (state.editingId) state.events = state.events.map(ev => ev.id === state.editingId ? event : ev);
      else state.events.push(event);
      render();
      closeModal();
      await saveEvents();
    }

    async function handleDelete() {
      if (!state.editingId) return;
      state.events = state.events.filter(ev => ev.id !== state.editingId);
      render();
      closeModal();
      await saveEvents();
    }

    function move(step) {
      const d = new Date(state.currentDate);
      if (state.currentView === 'month') d.setMonth(d.getMonth() + step);
      else if (state.currentView === 'week') d.setDate(d.getDate() + step * 7);
      else d.setDate(d.getDate() + step);
      state.currentDate = startOfDay(d);
      render();
    }

    function goToday() { state.currentDate = startOfDay(new Date()); render(); }

    function bindEvents() {
      document.getElementById('prevBtn').addEventListener('click', () => move(-1));
      document.getElementById('nextBtn').addEventListener('click', () => move(1));
      document.getElementById('todayBtn').addEventListener('click', goToday);
      document.getElementById('newEventBtn').addEventListener('click', () => openCreate(toYMD(state.currentDate)));
      document.getElementById('cancelBtn').addEventListener('click', closeModal);
      document.getElementById('saveBtn').addEventListener('click', handleSave);
      document.getElementById('deleteBtn').addEventListener('click', handleDelete);
      els.overlay.addEventListener('click', (e) => { if (e.target === els.overlay) closeModal(); });
      document.querySelectorAll('.who-chip').forEach(btn => btn.addEventListener('click', () => { state.currentUser = btn.dataset.who; render(); }));
      document.querySelectorAll('.view-chip').forEach(btn => btn.addEventListener('click', () => { state.currentView = btn.dataset.view; render(); }));
    }

    function startAutoRefresh() {
      if (state.refreshTimer) clearInterval(state.refreshTimer);
      state.refreshTimer = setInterval(() => loadEvents(false), 5000);
    }

    function updateOrientationClass() {
      const isLandscapeMobile = window.innerWidth <= 950 && window.innerWidth > window.innerHeight;
      document.body.classList.toggle('landscape-mobile', isLandscapeMobile);
    }

    window.addEventListener('resize', () => {
      updateOrientationClass();
      render();
    });

    updateOrientationClass();

    bindEvents();
    render();
    loadEvents(true);
    startAutoRefresh();
  </script>
</body>
</html>
